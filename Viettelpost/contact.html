<!DOCTYPE html>

<head>

    <title>CONTACT VIETTEL POST</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Style giống ảnh bạn gửi: màu đỏ chủ đạo, quote lớn, layout flex */
        .contact-container {
            text-align: center;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .title {
            color: #c62828; /* đỏ đậm giống ảnh */
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .main-phone {
            color: #c62828;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 50px;
        }
        .blocks {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }
        .quote-block {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: relative;
        }
        .quote-open, .quote-close {
            font-size: 4rem;
            color: #d32f2f; /* đỏ quote */
            line-height: 1;
            margin: 0;
            font-family: serif; /* để quote trông nghệ thuật hơn */
        }
        .quote-open { text-align: left; }
        .quote-close { text-align: right; }
        .quote-content {
            font-size: 1.1rem;
            color: #333;
            margin: 15px 0;
        }
        .name {
            font-weight: bold;
            color: #c62828;
        }
        .red-bar {
            height: 10px;
            background: #d32f2f; /* đỏ thanh ngang */
            margin: 60px auto 0;
            max-width: 900px;
            border-radius: 5px;
        }
        a.tel-link {
            color: #c62828;
            font-weight: bold;
            text-decoration: none;
        }
        a.tel-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
